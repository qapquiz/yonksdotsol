name: Android Tagged Build (Bun)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚡ Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: ☕ Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies with Bun
        run: bun install --frozen-lockfile

      - name: 🚀 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🛠 Build Android app locally on CI
        env:
          EXPO_PUBLIC_RPC_URL: ${{ secrets.EXPO_PUBLIC_RPC_URL }}
          EXPO_PUBLIC_HELIUS_API_KEY: ${{ secrets.EXPO_PUBLIC_HELIUS_API_KEY }}
        run: bunx eas-cli build --platform android --local --profile preview --non-interactive

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ github.ref_name }}
          path: |
            *.apk
            *.aab
